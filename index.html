            <button onclick="location.reload()"

    <script>
        const allQuestions = [
            { q: "مجموع زوايا المضلع الثماني يساوي:", options: ["<span class='math-content'>1080°</span>", "<span class='math-content'>720°</span>", "<span class='math-content'>1440°</span>", "<span class='math-content'>360°</span>"], correct: 0 },
            { q: "في متوازي الأضلاع، كل زاويتين متقابلتين تكونان:", options: ["متطابقتين", "متكاملتين", "متتامتين", "مختلفتين"], correct: 0 },
            { q: "إذا كان الزوج المرتب لإحدى رؤوس متوازي الأضلاع هو <span class='math-content'>(x, y) = (-4, 7)</span>، فإن الإحداثي السيني هو:", options: ["<span class='math-content'>-4</span>", "<span class='math-content'>7</span>", "<span class='math-content'>3</span>", "<span class='math-content'>-7</span>"], correct: 0 },
            { q: "المستطيل الذي تساوى فيه طولا ضلعي متجاورين هو:", options: ["مربع", "معين", "شبه منحرف", "طائرة ورقية"], correct: 0 },
            { q: "قطرا المعين يكونان دائماً:", options: ["متعامدين", "متطابقين", "متوازيين", "متماثلين"], correct: 0 },
            { q: "أي شكل مما يلي قطراه متطابقان وينصف كل منهما الآخر؟", options: ["المستطيل", "المعين", "شبه المنحرف", "الطائرة الورقية"], correct: 0 },
            { q: "في شبه المنحرف المتطابق الساقين، زوايا القاعدة الواحدة تكون:", options: ["متطابقة", "قائمة", "متكاملة", "متتامة"], correct: 0 },
            { q: "مجموع قياسات الزوايا الخارجية لأي مضلع محدب يساوي:", options: ["<span class='math-content'>360°</span>", "<span class='math-content'>180°</span>", "<span class='math-content'>540°</span>", "<span class='math-content'>720°</span>"], correct: 0 },
            { q: "قيمة <span class='math-content'>x</span> في متوازي الأضلاع إذا كانت الزوايا المتتالية هي <span class='math-content'>x</span> و <span class='math-content'>x + 60</span> تساوي:", options: ["<span class='math-content'>60</span>", "<span class='math-content'>120</span>", "<span class='math-content'>90</span>", "<span class='math-content'>30</span>"], correct: 0 },
            { q: "في المعين، القطران ينصفان:", options: ["زوايا الرأس", "الأضلاع", "القاعدة", "المحيط"], correct: 0 },
            { q: "شكل الطائرة الورقية له كم زوج من الأضلاع المتجاورة المتطابقة؟", options: ["زوجان", "زوج واحد", "ثلاثة أزواج", "أربعة أزواج"], correct: 0 },
            { q: "القطعة المتوسطة لشبه منحرف طولا قاعدتيه <span class='math-content'>8</span> و <span class='math-content'>12</span> هي:", options: ["<span class='math-content'>10</span>", "<span class='math-content'>20</span>", "<span class='math-content'>4</span>", "<span class='math-content'>15</span>"], correct: 0 },
            { q: "المضلع الذي مجموع زواياه الداخلية <span class='math-content'>540°</span> هو:", options: ["خماسي", "سداسي", "رباعي", "سباعي"], correct: 0 },
            { q: "في المستطيل <span class='math-content'>WXYZ</span> إذا كان <span class='math-content'>WY = 20</span> فإن <span class='math-content'>XZ =</span>", options: ["<span class='math-content'>20</span>", "<span class='math-content'>10</span>", "<span class='math-content'>40</span>", "<span class='math-content'>5</span>"], correct: 0 },
            { q: "إحداثيات نقطة المنتصف بين <span class='math-content'>(-2, 4)</span> و <span class='math-content'>(6, 8)</span> هي:", options: ["<span class='math-content'>(2, 6)</span>", "<span class='math-content'>(4, 12)</span>", "<span class='math-content'>(8, 4)</span>", "<span class='math-content'>(4, 4)</span>"], correct: 0 },
            { q: "ميل المستقيم الذي يمر بالنقطتين <span class='math-content'>(1, 2)</span> و <span class='math-content'>(3, 6)</span> هو:", options: ["<span class='math-content'>2</span>", "<span class='math-content'>-2</span>", "<span class='math-content'>0.5</span>", "<span class='math-content'>4</span>"], correct: 0 },
            { q: "يكون الشكل الرباعي متوازي أضلاع إذا كان فيه كل ضلعين متقابلين:", options: ["متوازيين", "متعامدين", "متقاطعين", "متجاورين"], correct: 0 },
            { q: "عدد أضلاع المضلع الذي قياس زاويته الداخلية <span class='math-content'>144°</span> هو:", options: ["<span class='math-content'>10</span>", "<span class='math-content'>12</span>", "<span class='math-content'>8</span>", "<span class='math-content'>15</span>"], correct: 0 },
            { q: "قطرا المربع متعامدان ومتطابقان:", options: ["دائماً", "أحياناً", "أبداً", "في حالات خاصة"], correct: 0 },
            { q: "في طائرة ورقية، القطران متعامدان ولكن أحدهما لا ينصف الآخر:", options: ["صح", "خطأ", "كلاهما ينصف الآخر", "لا يتقاطعان"], correct: 0 },
            { q: "إذا كان ميل <span class='math-content'>AB = 2/3</span> وميل <span class='math-content'>BC = -3/2</span> فإن الزاوية بينهما:", options: ["قائمة", "حادة", "منفرجة", "مستقيمة"], correct: 0 },
            { q: "شبه المنحرف الذي فيه الساقان متطابقان يسمى:", options: ["شبه منحرف متطابق الساقين", "متوازي أضلاع", "مستطيل", "معين"], correct: 0 },
            { q: "في متوازي الأضلاع <span class='math-content'>ABCD</span>، إذا كان <span class='math-content'>m∠A = 70°</span> فإن <span class='math-content'>m∠B =</span>", options: ["<span class='math-content'>110°</span>", "<span class='math-content'>70°</span>", "<span class='math-content'>180°</span>", "<span class='math-content'>20°</span>"], correct: 0 },
            { q: "الزاوية الخارجية للمضلع السداسي المنتظم تساوي:", options: ["<span class='math-content'>60°</span>", "<span class='math-content'>120°</span>", "<span class='math-content'>90°</span>", "<span class='math-content'>45°</span>"], correct: 0 },
            { q: "المسافة بين النقطتين <span class='math-content'>(0, 0)</span> و <span class='math-content'>(3, 4)</span> تساوي:", options: ["<span class='math-content'>5</span>", "<span class='math-content'>7</span>", "<span class='math-content'>12</span>", "<span class='math-content'>1</span>"], correct: 0 },
            { q: "كل معين هو متوازي أضلاع:", options: ["صح", "خطأ", "أحياناً", "فقط إذا كان مربعاً"], correct: 0 },
            { q: "إذا كان القطران متعامدين وغير متطابقين وينصف كل منهما الآخر، فالشكل هو:", options: ["معين", "مستطيل", "مربع", "طائرة ورقية"], correct: 0 },
            { q: "قاعدة شبه المنحرف المتوسطة توازي:", options: ["كلتا القاعدتين", "الساقين فقط", "القطرين", "لا توازي شيئاً"], correct: 0 },
            { q: "إحداثي نقطة تلاقي قطري متوازي أضلاع رؤوسه <span class='math-content'>(0, 0), (4, 0), (6, 4), (2, 4)</span> هي:", options: ["<span class='math-content'>(3, 2)</span>", "<span class='math-content'>(2, 2)</span>", "<span class='math-content'>(4, 2)</span>", "<span class='math-content'>(3, 3)</span>"], correct: 0 },
            { q: "مضلع له <span class='math-content'>5</span> أضلاع، مجموع زواياه الخارجية يساوي:", options: ["<span class='math-content'>360°</span>", "<span class='math-content'>540°</span>", "<span class='math-content'>180°</span>", "<span class='math-content'>90°</span>"], correct: 0 }
        ];

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let userFullName = "";

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startGame() {
            const input = document.getElementById('user-name');
            if (input.value.trim().split(' ').length < 3) {
                alert("لطفاً، ادخل اسمك الثلاثي للمتابعة.");
                return;
            }
            userFullName = input.value;
            
            // Prepare questions
            questions = shuffle([...allQuestions]).map(q => {
                const opts = [...q.options];
                const correctText = opts[q.correct];
                const shuffledOpts = shuffle(opts);
                return {
                    q: q.q,
                    options: shuffledOpts,
                    correct: shuffledOpts.indexOf(correctText)
                };
            });

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / 30`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const choicesDiv = document.getElementById('choices-container');
            choicesDiv.innerHTML = "";
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerHTML = opt;
                btn.onclick = () => handleAnswer(i, btn);
                choicesDiv.appendChild(btn);
            });

            document.getElementById('feedback-area').innerHTML = "";
        }

        function handleAnswer(idx, btn) {
            const q = questions[currentIdx];
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach(b => b.disabled = true);

            if (idx === q.correct) {
                score++;
                btn.classList.add('correct');
                document.getElementById('feedback-area').innerHTML = "<span class='text-green-400'>رائع! إجابة صحيحة</span>";
            } else {
                btn.classList.add('incorrect');
                document.getElementById('feedback-area').innerHTML = "<span class='text-red-400'>إجابة خاطئة، حاول في السؤال القادم</span>";
            }

            document.getElementById('score-live').innerText = `الدرجة: ${score}`;

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < 30) {
                    renderQuestion();
                } else {
                    showFinalResult();
                }
            }, 1500);
        }

        function showFinalResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-name').innerText = userFullName;
            document.getElementById('score-value').innerText = score;
        }
    </script>
</body>
</html>
